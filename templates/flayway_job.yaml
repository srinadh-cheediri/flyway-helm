apiVersion: batch/v1
kind: Job
metadata:
  name: flyway-migration
  namespace: flyway
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
spec:
  template:
    spec:
      containers:
        - name: flyway
          image: {Values.flyway.image}:{Values.flyway.tag}
          command: ["/bin/sh", "-c"]
          args:
            - >
              flyway
              -url=jdbc:postgresql://$(DB_HOST):5432/$(DB_NAME)
              -user=$(DB_USER)
              -password=$(DB_PASSWORD)
              -locations=filesystem:/flyway/sql
              migrate
          envFrom:
            - secretRef:
                name: db-secret
          volumeMounts:
            - name: sql
              mountPath: /flyway/sql

      restartPolicy: Never

      volumes:
        - name: sql
          configMap:
            name: flyway-sql

  backoffLimit: 1